site_name: flet-pkg
site_description: CLI tool to scaffold Flet extension packages
site_url: https://brunobrown.github.io/flet-pkg
repo_url: https://github.com/brunobrown/flet-pkg
repo_name: brunobrown/flet-pkg

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli-reference.md
  - Templates:
      - Service: extension-templates/service.md
      - UI Control: extension-templates/ui-control.md
  - Architecture: architecture.md
  - Contributing: contributing.md
